<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>酷澎各倉別路線連結路口</title>
  <meta name="description" content="TAO、TXRC、TPH 倉別 Canva 連結入口。" />
  <style>
    :root {
      --bg: #f0f2f5;
      --panel: rgba(255, 255, 255, .85);
      --panel-strong: rgba(255, 255, 255, .92);
      --text: #1e293b;
      --muted: rgba(30, 41, 59, .60);
      --line: rgba(0, 0, 0, .10);
      --shadow: 0 8px 32px rgba(0, 0, 0, .06), 0 2px 8px rgba(0, 0, 0, .04);
      --accent: #3b82f6;
      --accent-2: #8b5cf6;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(125, 211, 252, .20), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(192, 132, 252, .15), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(34, 197, 94, .10), transparent 34%),
        linear-gradient(135deg, #eef2f7 0%, #f0f2f5 50%, #e8ecf1 100%);
      padding: 28px;
    }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      min-height: calc(100vh - 56px);
      display: grid;
      place-items: center;
    }

    .wrap {
      width: 100%;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.80));
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 36px;
      padding: clamp(28px, 5vw, 60px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: -2px;
      pointer-events: none;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,.40), transparent);
      transform: translateX(-70%);
      animation: shine 7s ease-in-out infinite;
    }

    @keyframes shine {
      0%, 60% { transform: translateX(-70%); }
      100% { transform: translateX(70%); }
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 34px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 0;
      border: none;
      background: none;
      border-radius: 0;
      font-size: clamp(48px, 12vw, 80px);
      font-weight: 900;
      letter-spacing: .02em;
    }

    .eyebrow span {
      display: inline-block;
      text-shadow: 0 2px 8px rgba(0,0,0,.08);
      transition: transform .2s ease;
    }

    .eyebrow span:hover {
      transform: scale(1.12) translateY(-2px);
    }

    .c-red { color: #e60012; }
    .c-orange { color: #f5a623; }
    .c-yellow { color: #f8d000; }
    .c-green { color: #00a650; }
    .c-blue { color: #00a3e0; }
    .c-purple { color: #7b2d8e; }
    .c-dark { color: #2d2d2d; }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.1;
      letter-spacing: -0.04em;
      color: #1a2a3a;
    }

    .morandi {
      font-size: 1.15em;
      margin-right: .15em;
      background: linear-gradient(135deg, #7a9ab5, #9bb0c4, #a8b8c8, #8da3b5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 3px 6px rgba(90, 125, 160, .35));
    }

    .title-underline {
      text-decoration: underline;
      text-decoration-color: rgba(160, 180, 200, .35);
      text-underline-offset: 6px;
      text-decoration-thickness: 4px;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 680px;
      color: var(--muted);
      font-size: clamp(15px, 2.4vw, 18px);
      line-height: 1.8;
    }

    .toolbar {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
      margin: 0 auto 22px;
      max-width: 720px;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.65);
      color: var(--text);
      border-radius: 16px;
      padding: 16px 20px;
      outline: none;
      font-size: 16px;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .search:focus {
      border-color: rgba(59, 130, 246, .40);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .10);
    }

    .search::placeholder {
      color: rgba(30, 41, 59, .40);
    }

    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      position: relative;
      min-height: 110px;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background:
        linear-gradient(145deg, rgba(255,255,255,.82), rgba(255,255,255,.55));
      color: var(--text);
      text-decoration: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      transition: transform .22s ease, border-color .22s ease, background .22s ease, box-shadow .22s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 999px;
      right: -46px;
      top: -46px;
      background: radial-gradient(circle, rgba(59, 130, 246, .15), transparent 62%);
      opacity: .9;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-5px) scale(1.02);
      border-color: rgba(59, 130, 246, .35);
      background:
        linear-gradient(145deg, rgba(59, 130, 246, .10), rgba(139, 92, 246, .06));
      box-shadow: 0 16px 40px rgba(0,0,0,.08), 0 4px 12px rgba(59, 130, 246, .08);
    }

    .code {
      font-size: clamp(22px, 5vw, 34px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .label {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .arrow {
      position: absolute;
      top: 12px;
      right: 14px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(0,0,0,.05);
      border: 1px solid rgba(0,0,0,.08);
      font-size: 15px;
      transition: background .2s ease, transform .2s ease;
    }

    .card:hover .arrow {
      background: rgba(59, 130, 246, .12);
      transform: translate(2px, -2px);
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 28px;
      text-align: center;
      color: rgba(30, 41, 59, .45);
      font-size: 13px;
    }

    @media (min-width: 768px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        min-height: 130px;
        padding: 20px;
        border-radius: 24px;
      }

      .arrow {
        top: 16px;
        right: 18px;
        width: 34px;
        height: 34px;
        font-size: 18px;
      }

      .label {
        font-size: 14px;
      }
    }

    @media (min-width: 1024px) {
      .grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .card {
        min-height: 142px;
      }
    }

    @media (max-width: 767px) {
      body {
        padding: 10px;
      }

      .shell {
        min-height: calc(100vh - 20px);
      }

      .wrap {
        border-radius: 20px;
        padding: 18px;
      }

      header {
        margin-bottom: 20px;
      }

      .eyebrow {
        font-size: 42px;
      }

      h1 {
        font-size: 28px;
        margin: 12px 0 8px;
      }

      .subtitle {
        font-size: 14px;
        line-height: 1.6;
      }

      .search {
        padding: 12px 14px;
        font-size: 15px;
        border-radius: 14px;
      }

      .toolbar {
        margin-bottom: 16px;
      }

      footer {
        margin-top: 18px;
        font-size: 12px;
      }
    }

    @media (max-width: 360px) {
      .grid {
        gap: 10px;
      }

      .card {
        min-height: 96px;
        padding: 14px;
      }

      .code {
        font-size: 20px;
      }
    }
  </style>
</head>

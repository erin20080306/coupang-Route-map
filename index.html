<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>酷澎各倉別路線連結路口</title>
  <meta name="description" content="TAO、TXRC、TPH 倉別 Canva 連結入口。" />
  <style>
    :root {
      --bg: #070b1a;
      --panel: rgba(255, 255, 255, .10);
      --panel-strong: rgba(255, 255, 255, .16);
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, .70);
      --line: rgba(255, 255, 255, .18);
      --shadow: 0 24px 80px rgba(0, 0, 0, .34);
      --accent: #7dd3fc;
      --accent-2: #c084fc;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(125, 211, 252, .35), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(192, 132, 252, .30), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(34, 197, 94, .16), transparent 34%),
        linear-gradient(135deg, #050816 0%, #0f172a 50%, #111827 100%);
      padding: 28px;
    }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      min-height: calc(100vh - 56px);
      display: grid;
      place-items: center;
    }

    .wrap {
      width: 100%;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.07));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 32px;
      padding: clamp(24px, 5vw, 54px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: -2px;
      pointer-events: none;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,.18), transparent);
      transform: translateX(-70%);
      animation: shine 7s ease-in-out infinite;
    }

    @keyframes shine {
      0%, 60% { transform: translateX(-70%); }
      100% { transform: translateX(70%); }
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 34px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid rgba(125, 211, 252, .35);
      background: rgba(125, 211, 252, .10);
      color: #e0f2fe;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .08em;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 680px;
      color: var(--muted);
      font-size: clamp(15px, 2.4vw, 18px);
      line-height: 1.8;
    }

    .toolbar {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
      margin: 0 auto 22px;
      max-width: 720px;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.10);
      color: var(--text);
      border-radius: 18px;
      padding: 16px 18px;
      outline: none;
      font-size: 16px;
    }

    .search::placeholder {
      color: rgba(248, 250, 252, .48);
    }

    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      position: relative;
      min-height: 110px;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.07));
      color: var(--text);
      text-decoration: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      transition: transform .22s ease, border-color .22s ease, background .22s ease, box-shadow .22s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 999px;
      right: -46px;
      top: -46px;
      background: radial-gradient(circle, rgba(125, 211, 252, .34), transparent 62%);
      opacity: .9;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-6px);
      border-color: rgba(125, 211, 252, .60);
      background:
        linear-gradient(135deg, rgba(125, 211, 252, .22), rgba(192, 132, 252, .13));
      box-shadow: 0 18px 44px rgba(0,0,0,.28);
    }

    .code {
      font-size: clamp(22px, 5vw, 34px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .label {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .arrow {
      position: absolute;
      top: 12px;
      right: 14px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.16);
      font-size: 15px;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 28px;
      text-align: center;
      color: rgba(248, 250, 252, .52);
      font-size: 13px;
    }

    @media (min-width: 768px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        min-height: 130px;
        padding: 20px;
        border-radius: 24px;
      }

      .arrow {
        top: 16px;
        right: 18px;
        width: 34px;
        height: 34px;
        font-size: 18px;
      }

      .label {
        font-size: 14px;
      }
    }

    @media (min-width: 1024px) {
      .grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .card {
        min-height: 142px;
      }
    }

    @media (max-width: 767px) {
      body {
        padding: 10px;
      }

      .shell {
        min-height: calc(100vh - 20px);
      }

      .wrap {
        border-radius: 20px;
        padding: 18px;
      }

      header {
        margin-bottom: 20px;
      }

      .eyebrow {
        font-size: 12px;
        padding: 6px 12px;
      }

      h1 {
        font-size: 28px;
        margin: 12px 0 8px;
      }

      .subtitle {
        font-size: 14px;
        line-height: 1.6;
      }

      .search {
        padding: 12px 14px;
        font-size: 15px;
        border-radius: 14px;
      }

      .toolbar {
        margin-bottom: 16px;
      }

      footer {
        margin-top: 18px;
        font-size: 12px;
      }
    }

    @media (max-width: 360px) {
      .grid {
        gap: 10px;
      }

      .card {
        min-height: 96px;
        padding: 14px;
      }

      .code {
        font-size: 20px;
      }
    }
  </style>
</head>

  </main>

  <script>
    const search = document.querySelector("#search");
    const cards = [...document.querySelectorAll(".card")];

    search.addEventListener("input", () => {
      const keyword = search.value.trim().toLowerCase();
      cards.forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(keyword) ? "flex" : "none";
      });
    });
  </script>

</html>
